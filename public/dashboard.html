<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Chat</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #0a0e1a; color: #F5E6D3; overflow: hidden; }

    #pixie-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
    }

    .app { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* New Navigation Sidebar */
    .nav-sidebar {
      width: 220px;
      background: rgba(10, 14, 26, 0.98);
      padding: 20px 10px;
      border-right: 1px solid rgba(245,230,211,0.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(245,230,211,0.1);
      color: #F5E6D3;
    }
    .nav-item.active { background: rgba(245,230,211,0.15); font-weight: bold; }

    /* Main Content Area */
    .main-content { display: flex; flex: 1; }

    .main-sidebar {
      width: 300px;
      background: rgba(12, 16, 28, 0.92);
      padding: 20px;
      border-right: 1px solid rgba(245,230,211,0.1);
      overflow-y: auto;
    }

    .chat-area { flex: 1; display: flex; flex-direction: column; }

    .sidebar h2, .nav-sidebar h2 {
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: #E8DCC8;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .header { padding: 14px 20px; background: rgba(12, 16, 28, 0.92); border-bottom: 1px solid rgba(245,230,211,0.1); display: flex; justify-content: space-between; align-items: center; }

    /* Leaderboard & Poll Styling */
    .leaderboard-item, .poll-option {
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 10px;
      background: rgba(245,230,211,0.06);
    }
    .gold { color: #ffd700; } .silver { color: #c0c0c0; } .bronze { color: #cd7f32; }

    /* Keep your original message, button, call modal styles */
    .messages { flex: 1; padding: 20px; overflow-y: auto; }
    .message { padding: 10px 15px; border-radius: 12px; max-width: 85%; margin-bottom: 8px; }
    .sent { background: #E8DCC8; color: #0a0e1a; margin-left: auto; }
    .received { background: rgba(245,230,211,0.08); border: 1px solid rgba(245,230,211,0.12); }
    button { padding: 11px 16px; border: none; border-radius: 8px; cursor: pointer; }
    .send-btn, .record-btn, .call-btn { background: #E8DCC8; color: #0a0e1a; }
    .logout-btn, .admin-btn { background: #7f1d1d; color: white; }
  </style>
</head>
<body>
  <canvas id="pixie-canvas"></canvas>
  <div class="app">
    <!-- Navigation Sidebar -->
    <div class="nav-sidebar">
      <h2>✦ Time Warp</h2>
      <div class="nav-item active" onclick="switchTab(0)">🏠 Home</div>
      <div class="nav-item" onclick="switchTab(1)">🏆 Leaderboard</div>
      <div class="nav-item" onclick="switchTab(2)">🎮 Games & Polls</div>
      <div style="margin-top: auto;">
        <button class="admin-btn" id="adminBtn" onclick="goToAdmin()" style="display:none; width:100%;">⚙️ Admin Panel</button>
        <button class="logout-btn" onclick="logout()" style="width:100%; margin-top:10px;">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Online Users + Poll Sidebar -->
      <div class="main-sidebar">
        <h2>👥 Online Users</h2>
        <div id="onlineUsers"></div>

        <h2>🗳️ Active Poll</h2>
        <div id="activePoll"></div>
      </div>

      <!-- Chat Area -->
      <div class="chat-area">
        <div class="header">
          <h2 id="chatHeader">Select someone to chat</h2>
          <span>Welcome, <b id="myName"></b></span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <input type="text" id="messageInput" placeholder="Type a message…" />
          <button class="send-btn" onclick="sendMessage()">Send</button>
          <button class="record-btn" id="recordBtn" onclick="toggleVoiceRecording()">🎤</button>
          <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📎</button>
          <button class="call-btn" onclick="startAudioCall()">🎙️ Call</button>
          <button class="send-btn" onclick="startVideoCall()">📹 Video</button>
        </div>
        <input type="file" id="fileInput" style="display:none" accept="image/*,video/*" />
      </div>

      <!-- Leaderboard Panel (hidden by default) -->
      <div id="leaderboardPanel" class="main-sidebar" style="display:none; width:380px;">
        <h2>🏆 Global Leaderboard</h2>
        <div id="leaderboard"></div>
      </div>
    </div>
  </div>

  <!-- Call Modal remains the same -->
  <div class="call-modal" id="callModal">...</div>

  <script>
    // Your existing Pixie Dust + WebRTC + auth code here...

    const token = localStorage.getItem('token');
    if (!token) window.location.replace('/login');

    let myName = localStorage.getItem('name') || "You";
    let isAdminUser = localStorage.getItem('isAdmin') === 'true';
    document.getElementById('myName').textContent = myName;
    if (isAdminUser) document.getElementById('adminBtn').style.display = 'block';

    function logout() { localStorage.clear(); window.location.replace('/login'); }
    function goToAdmin() { window.location.href = '/admin'; }

    const socket = io();
    socket.emit('login', { name: myName });

    // Tab Switching
    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach((el, i) => {
        el.classList.toggle('active', i === tab);
      });

      const leaderboardPanel = document.getElementById('leaderboardPanel');
      if (tab === 1) {
        leaderboardPanel.style.display = 'block';
        loadLeaderboard();
      } else {
        leaderboardPanel.style.display = 'none';
      }
    }

    // Load Leaderboard
    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      let html = '';
      data.forEach((item, i) => {
        const medal = ['🥇','🥈','🥉'][i] || '🏅';
        const color = ['gold','silver','bronze'][i] || '';
        html += `<div class="leaderboard-item"><span>${medal} ${item.name}</span><span class="${color}">${item.points} pts</span></div>`;
      });
      document.getElementById('leaderboard').innerHTML = html || '<p>No rankings yet...</p>';
    }

    // Poll System
    let currentPoll = null;
    socket.on('newPoll', poll => { currentPoll = poll; showPoll(poll); });
    socket.on('pollUpdate', poll => { if (currentPoll?.id === poll.id) showPoll(poll); });
    socket.on('pollClosed', () => {
      document.getElementById('activePoll').innerHTML = `<p style="color:#86efac">Poll closed! Leaderboard updated.</p>`;
      loadLeaderboard();
    });

    function showPoll(poll) {
      let html = `<strong>${poll.question}</strong><br>`;
      poll.options.forEach(opt => {
        html += `<div class="poll-option" onclick="vote('${opt}')">${opt}</div>`;
      });
      document.getElementById('activePoll').innerHTML = html;
    }

    async function vote(option) {
      await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ option })
      });
      alert(`✅ Voted for ${option}`);
    }

    // Keep all your original chat, call, online users code below...
    // (socket.on('onlineUsers'), sendMessage, WebRTC functions, etc.)

  </script>
</body>
</html>
