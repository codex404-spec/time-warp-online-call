<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Connect</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111827;
      --accent: #a5b4fc;
      --text: #f3e8ff;
    }
    body { background: var(--bg-primary); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
    .glass { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(165, 180, 252, 0.1); }
    .nav-item { transition: all 0.2s; }
    .nav-item.active { background: rgba(165, 180, 252, 0.15); border-left: 4px solid var(--accent); }
    .chat-bubble-user { background: linear-gradient(135deg, #6366f1, #a5b4fc); }
    .chat-bubble-other { background: #1f2937; }
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div class="flex h-full">
    <!-- Left Navigation Sidebar -->
    <div class="w-64 glass border-r border-white/10 flex flex-col">
      <div class="p-6 border-b border-white/10">
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <i class="fas fa-bolt text-indigo-400"></i> Time Warp
        </h1>
      </div>

      <div class="p-4 flex-1 overflow-y-auto">
        <div onclick="switchTab(0)" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer mb-1">
          <i class="fas fa-home w-5"></i>
          <span class="font-medium">Home</span>
        </div>
        <div onclick="switchTab(1)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer mb-1">
          <i class="fas fa-trophy w-5"></i>
          <span class="font-medium">Leaderboard</span>
        </div>
        <div onclick="switchTab(2)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer mb-1">
          <i class="fas fa-gamepad w-5"></i>
          <span class="font-medium">Games & Polls</span>
        </div>
      </div>

      <div class="p-4 border-t border-white/10 mt-auto">
        <button onclick="goToAdmin()" id="adminBtn" class="w-full py-3 glass text-white rounded-2xl flex items-center justify-center gap-2 hidden">
          <i class="fas fa-cog"></i> Admin Panel
        </button>
        <button onclick="logout()" class="w-full mt-2 py-3 bg-red-900/50 hover:bg-red-900 text-white rounded-2xl">
          Logout
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col" id="homePanel">
      <!-- Chat Header -->
      <div class="glass border-b border-white/10 p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div id="chatHeader" class="font-semibold">Global Chat</div>
        </div>
        <div class="flex items-center gap-4">
          <span>Welcome, <b id="myName"></b></span>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-4"></div>

      <!-- Input -->
      <div class="glass p-4 border-t border-white/10">
        <div class="flex gap-3">
          <input type="text" id="messageInput" class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 focus:outline-none" placeholder="Type a message...">
          <button onclick="sendMessage()" class="px-8 bg-indigo-600 hover:bg-indigo-500 rounded-2xl">Send</button>
        </div>
      </div>
    </div>

    <!-- Leaderboard Panel -->
    <div id="leaderboardPanel" class="flex-1 hidden flex-col glass">
      <div class="p-6 border-b border-white/10">
        <h2 class="text-2xl font-bold">🏆 Leaderboard</h2>
      </div>
      <div id="leaderboard" class="flex-1 p-6 overflow-y-auto"></div>
    </div>

    <!-- Games & Polls Panel -->
    <div id="pollsPanel" class="flex-1 hidden flex-col glass">
      <div class="p-6 border-b border-white/10">
        <h2 class="text-2xl font-bold">🗳️ Games & Polls</h2>
      </div>
      <div id="activePoll" class="flex-1 p-6 overflow-y-auto"></div>
    </div>
  </div>

  <script>
    // Tailwind Script
    tailwind.config = { content: ["./**/*.html"] };

    const token = localStorage.getItem('token');
    if (!token) window.location.replace('/login');

    let myName = localStorage.getItem('name') || "You";
    let isAdminUser = localStorage.getItem('isAdmin') === 'true';
    document.getElementById('myName').textContent = myName;
    if (isAdminUser) document.getElementById('adminBtn').classList.remove('hidden');

    function logout() {
      localStorage.clear();
      window.location.replace('/login');
    }
    function goToAdmin() {
      window.location.href = '/admin';
    }

    const socket = io();
    socket.emit('login', { name: myName });

    // Tab Switching
    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === tab));

      document.getElementById('homePanel').classList.toggle('hidden', tab !== 0);
      document.getElementById('leaderboardPanel').classList.toggle('hidden', tab !== 1);
      document.getElementById('pollsPanel').classList.toggle('hidden', tab !== 2);

      if (tab === 1) loadLeaderboard();
    }

    // Leaderboard
    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      let html = data.map((item, i) => `
        <div class="glass p-4 rounded-2xl mb-3 flex justify-between items-center">
          <div class="flex items-center gap-4">
            <span class="text-3xl">${['🥇','🥈','🥉'][i] || '🏅'}</span>
            <div>
              <div class="font-semibold">${item.name}</div>
              <div class="text-sm opacity-70">${item.year}</div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-xl font-bold ${['text-yellow-400','text-gray-300','text-amber-700'][i] || ''}">${item.points} pts</div>
          </div>
        </div>
      `).join('');
      document.getElementById('leaderboard').innerHTML = html || '<p class="opacity-60 text-center mt-10">No rankings yet...</p>';
    }

    // Poll System
    let currentPoll = null;
    socket.on('newPoll', poll => { currentPoll = poll; showPoll(poll); });
    socket.on('pollClosed', () => {
      document.getElementById('activePoll').innerHTML = `<p class="text-green-400 text-center">Poll closed! Check Leaderboard.</p>`;
      loadLeaderboard();
    });

    function showPoll(poll) {
      let html = `<div class="glass p-6 rounded-3xl"><h3 class="text-xl font-semibold mb-4">${poll.question}</h3>`;
      poll.options.forEach(opt => {
        html += `<div onclick="vote('${opt}')" class="poll-option p-4 rounded-2xl mb-3 cursor-pointer hover:bg-white/10 transition">${opt}</div>`;
      });
      html += `</div>`;
      document.getElementById('activePoll').innerHTML = html;
    }

    async function vote(option) {
      await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ option })
      });
      alert(`Voted for: ${option}`);
    }

    // Chat functionality (basic)
    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      socket.emit('sendMessage', { name: myName, text: input.value });
      input.value = '';
    }

    socket.on('receiveMessage', msg => {
      const div = document.createElement('div');
      div.className = `flex ${msg.name === myName ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `
        <div class="${msg.name === myName ? 'chat-bubble-user' : 'chat-bubble-other'} max-w-[70%] px-5 py-3 rounded-3xl text-white">
          <strong class="text-xs opacity-75">${msg.name}</strong><br>
          ${msg.text}
        </div>
      `;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    });

    // Load initial leaderboard
    loadLeaderboard();
  </script>
</body>
</html>
