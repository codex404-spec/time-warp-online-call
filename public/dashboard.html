<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Chat</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    body { margin:0; font-family: Arial; background: #0f172a; color: white; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 320px; background: #1e2937; padding: 20px; border-right: 1px solid #334155; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .header { padding: 15px; background: #1e2937; border-bottom: 1px solid #334155; }
    .messages { flex: 1; padding: 20px; overflow-y: auto; background: #0f172a; }
    .message { margin: 8px 0; padding: 12px 16px; border-radius: 12px; max-width: 75%; }
    .sent { background: #22d3ee; color: black; margin-left: auto; }
    .received { background: #334155; }
    .input-area { padding: 15px; background: #1e2937; display: flex; gap: 8px; flex-wrap: wrap; }
    input { flex: 1; padding: 14px; border: none; border-radius: 8px; }
    button { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; }
    .send-btn { background: #22d3ee; color: black; }
    .call-btn { background: #4ade80; }
    .upload-btn { background: #8b5cf6; }
    .user-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; }
    .user-item:hover { background: #334155; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h2>🟢 Online Users</h2>
      <div id="onlineUsers"></div>
    </div>

    <div class="chat-area">
      <div class="header">
        <h2 id="chatHeader">Select a user to start chatting</h2>
        <span>Welcome, <b id="myName"></b></span>
      </div>
      
      <div class="messages" id="messages"></div>
      
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button class="send-btn" onclick="sendMessage()">Send</button>
        <button class="call-btn" onclick="startAudioCall()">🎙️ Audio Call</button>
        <button onclick="startVideoCall()" style="background:#f97316;">📹 Video</button>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" style="display:none" accept="image/*,video/*,audio/*" />
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let currentChatWith = null;
    let myName = localStorage.getItem('name') || "You";

    document.getElementById('myName').textContent = myName;

    // Connect to socket
    socket.emit('login', { name: myName });

    socket.on('onlineUsers', (users) => {
      const container = document.getElementById('onlineUsers');
      container.innerHTML = '';
      users.forEach(user => {
        if (user.name !== myName) {
          const div = document.createElement('div');
          div.className = 'user-item';
          div.innerHTML = `<strong>${user.name}</strong>`;
          div.onclick = () => startChat(user);
          container.appendChild(div);
        }
      });
    });

    function startChat(user) {
      currentChatWith = user;
      document.getElementById('chatHeader').textContent = `Chatting with ${user.name}`;
      document.getElementById('messages').innerHTML = '';
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChatWith) return;

      const messageData = {
        from: myName,
        to: currentChatWith.name,
        text: text,
        type: 'text',
        time: new Date().toLocaleTimeString()
      };

      socket.emit('sendMessage', messageData);
      addMessage(messageData, true);
      input.value = '';
    }

    function addMessage(msg, isMine) {
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'sent' : 'received'}`;
      div.textContent = `${msg.from}: ${msg.text}`;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    }

    socket.on('receiveMessage', (msg) => {
      if (currentChatWith && msg.from === currentChatWith.name) {
        addMessage(msg, false);
      }
    });

    // Audio & Video Calls (Basic)
    function startAudioCall() {
      if (!currentChatWith) return alert("Select a user first");
      alert(`📞 Starting Audio Call with ${currentChatWith.name}...`);
    }

    function startVideoCall() {
      if (!currentChatWith) return alert("Select a user first");
      alert(`📹 Starting Video Call with ${currentChatWith.name}...`);
    }

    // Enter key to send
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
