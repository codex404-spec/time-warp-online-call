<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Connect</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #0a0e1a; color: #F5E6D3; overflow: hidden; }

    #pixie-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    .app { display: flex; height: 100vh; position: relative; z-index: 1; }

    .nav-sidebar { width: 240px; background: rgba(12,16,28,0.98); padding: 24px 12px; border-right: 1px solid rgba(245,230,211,0.1); display: flex; flex-direction: column; }
    .nav-item { padding: 14px 20px; margin: 4px 8px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #E8DCC8; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(245,230,211,0.18); color: #F5E6D3; }

    .main-content { display: flex; flex: 1; }
    .main-sidebar { width: 300px; background: rgba(12,16,28,0.95); padding: 20px; border-right: 1px solid rgba(245,230,211,0.1); overflow-y: auto; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }

    .header { padding: 16px 24px; background: rgba(12,16,28,0.95); border-bottom: 1px solid rgba(245,230,211,0.1); display: flex; justify-content: space-between; align-items: center; }

    .glass { background: rgba(245,230,211,0.04); border: 1px solid rgba(245,230,211,0.1); border-radius: 16px; }
    .message { padding: 12px 16px; margin: 8px 0; border-radius: 12px; max-width: 75%; position: relative; }
    .sent { background: #E8DCC8; color: #0a0e1a; margin-left: auto; border-bottom-right-radius: 4px; }
    .received { background: rgba(245,230,211,0.1); border: 1px solid rgba(245,230,211,0.2); margin-right: auto; }

    .reaction { display: inline-block; margin: 4px 2px; cursor: pointer; font-size: 1.2rem; }
    .typing { font-style: italic; opacity: 0.7; font-size: 0.9rem; }

    button { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .send-btn { background: #E8DCC8; color: #0a0e1a; }
    .secret-key { position: fixed; bottom: 25px; left: 25px; z-index: 1000; opacity: 0.15; transition: all 0.4s; padding: 14px; background: rgba(12,16,28,0.85); border-radius: 50%; border: 2px solid #E8DCC8; cursor: pointer; }
    .secret-key:hover { opacity: 1; transform: scale(1.15); }
  </style>
</head>
<body>
  <canvas id="pixie-canvas"></canvas>
  
  <div class="app">
    <!-- Nav Sidebar -->
    <div class="nav-sidebar">
      <h2 style="color:#E8DCC8; padding: 0 16px 20px; font-size:1.4rem;">✦ Time Warp</h2>
      <div onclick="switchTab(0)" class="nav-item active"><i class="fas fa-home"></i> Home</div>
      <div onclick="switchTab(1)" class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</div>
      <div onclick="switchTab(2)" class="nav-item"><i class="fas fa-gamepad"></i> Games</div>

      <div style="margin-top: auto; padding: 16px;">
        <button onclick="goToAdmin()" id="adminBtn" class="admin-btn w-full mb-3 hidden">⚙️ Admin Panel</button>
        <button onclick="logout()" class="logout-btn w-full">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Chat Area -->
      <div id="homePanel" class="chat-area flex-1 flex flex-col">
        <div class="header">
          <h2 id="chatHeader">Global Chat</h2>
          <div>Welcome, <b id="myName"></b></div>
        </div>
        <div id="messages" class="flex-1 p-6 overflow-y-auto"></div>
        <div class="p-4 border-t border-white/10 bg-[#0a0e1a]">
          <div id="typingIndicator" class="typing mb-2"></div>
          <div class="flex gap-3">
            <input type="text" id="messageInput" class="flex-1 bg-transparent border border-[#E8DCC8]/30 rounded-2xl px-5 py-4 focus:outline-none" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="send-btn">Send</button>
          </div>
        </div>
      </div>

      <!-- Other Panels (Leaderboard & Games) -->
      <div id="leaderboardPanel" class="hidden flex-1 flex-col main-sidebar">...</div>
      <div id="pollsPanel" class="hidden flex-1 flex-col main-sidebar">...</div>
    </div>
  </div>

  <!-- Secret Key -->
  <div class="secret-key" onclick="showAdminQuickLogin()" title="Quick Admin Login">
    <i class="fas fa-key"></i>
  </div>

  <script>
    // Pixie Dust (same as before)
    (function initPixieDust() { /* ... */ })();

    const token = localStorage.getItem('token');
    const myName = localStorage.getItem('name');
    if (!token || !myName) window.location.replace('/login');

    document.getElementById('myName').textContent = myName;
    if (localStorage.getItem('isAdmin') === 'true') document.getElementById('adminBtn').classList.remove('hidden');

    const socket = io();
    socket.emit('login', { name: myName });

    let currentChat = 'global';

    // Typing
    let typingTimeout;
    document.getElementById('messageInput').addEventListener('input', () => {
      socket.emit('typing', { name: myName });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stopTyping'), 1500);
    });

    socket.on('userTyping', data => {
      if (data.name !== myName) document.getElementById('typingIndicator').textContent = `${data.name} is typing...`;
    });
    socket.on('userStopTyping', () => document.getElementById('typingIndicator').textContent = '');

    // Send Message
    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim()) return;

      const msg = { name: myName, text: input.value, time: Date.now() };
      socket.emit('sendMessage', msg);
      addMessage(msg, true);
      input.value = '';
    }
