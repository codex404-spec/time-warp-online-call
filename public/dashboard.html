<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Connect</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Georgia', serif; 
      background: #0a0e1a; 
      color: #F5E6D3; 
      overflow: hidden; 
      transition: background 0.8s;
    }

    #pixie-canvas, #theme-video { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      object-fit: cover; pointer-events: none; z-index: -1; 
    }
    #theme-video { display: none; opacity: 0.65; }

    .app { display: flex; height: 100vh; position: relative; z-index: 1; }

    .nav-sidebar { width: 240px; background: rgba(12,16,28,0.98); padding: 24px 12px; border-right: 1px solid rgba(245,230,211,0.1); display: flex; flex-direction: column; }
    .nav-item { padding:14px 20px; margin:4px 8px; border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:12px; color:#E8DCC8; transition:all 0.2s; }
    .nav-item:hover, .nav-item.active { background:rgba(245,230,211,0.18); color:#F5E6D3; }

    .main-content { display: flex; flex: 1; }
    .main-sidebar { width: 300px; background: rgba(12,16,28,0.95); padding: 20px; border-right: 1px solid rgba(245,230,211,0.1); overflow-y: auto; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }

    .header { padding: 16px 24px; background: rgba(12,16,28,0.95); border-bottom: 1px solid rgba(245,230,211,0.1); display: flex; justify-content: space-between; align-items: center; }

    .message { padding: 12px 16px; margin: 8px 0; border-radius: 12px; max-width: 75%; position: relative; }
    .sent { background: #E8DCC8; color: #0a0e1a; margin-left: auto; border-bottom-right-radius: 4px; }
    .received { background: rgba(245,230,211,0.1); border: 1px solid rgba(245,230,211,0.2); margin-right: auto; }

    .reaction { display: inline-block; margin: 4px 3px; cursor: pointer; font-size: 1.35rem; transition: transform 0.2s; }
    .reaction:hover { transform: scale(1.5); }

    .typing { font-style: italic; opacity: 0.7; padding-left: 10px; }

    button { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .send-btn { background: #E8DCC8; color: #0a0e1a; }
    .logout-btn { background: #7f1d1d; color: #fca5a5; }
    .admin-btn { background: #5c3311; color: #F5E6D3; }
    .theme-btn { padding: 8px 16px; background: rgba(12,16,28,0.8); border: 1px solid #E8DCC8; border-radius: 9999px; cursor: pointer; }

    .secret-key {
      position: fixed; bottom: 25px; left: 25px; z-index: 1000; opacity: 0.15; transition: all 0.4s;
      padding: 14px; background: rgba(12,16,28,0.85); border-radius: 50%; border: 2px solid #E8DCC8; cursor: pointer;
    }
    .secret-key:hover { opacity: 1; transform: scale(1.15); }
  </style>
</head>
<body>
  <!-- Backgrounds -->
  <video id="theme-video" loop muted playsinline></video>
  <canvas id="pixie-canvas"></canvas>

  <div class="app">
    <!-- Navigation -->
    <div class="nav-sidebar">
      <h2 style="color:#E8DCC8; padding:0 16px 20px; font-size:1.4rem;">✦ Time Warp</h2>
      <div onclick="switchTab(0)" class="nav-item active"><i class="fas fa-home"></i> Home</div>
      <div onclick="switchTab(1)" class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</div>
      <div onclick="switchTab(2)" class="nav-item"><i class="fas fa-gamepad"></i> Games</div>

      <div style="margin-top:auto; padding:16px;">
        <button onclick="goToAdmin()" id="adminBtn" class="admin-btn w-full mb-3 hidden">⚙️ Admin Panel</button>
        <button onclick="logout()" class="logout-btn w-full">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Chat -->
      <div id="homePanel" class="chat-area flex-1 flex flex-col">
        <div class="header">
          <h2 id="chatHeader">Global Chat</h2>
          <div style="display:flex; align-items:center; gap:12px;">
            <span>Welcome, <b id="myName"></b></span>
            <button onclick="toggleTheme()" class="theme-btn">🌅 Theme</button>
          </div>
        </div>
        <div id="messages" class="flex-1 p-6 overflow-y-auto"></div>
        <div class="p-4 border-t border-white/10 bg-[#0a0e1a]">
          <div id="typingIndicator" class="typing"></div>
          <div class="flex gap-3">
            <input type="text" id="messageInput" class="flex-1 bg-transparent border border-[#E8DCC8]/30 rounded-2xl px-5 py-4 focus:outline-none" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="send-btn">Send</button>
          </div>
        </div>
      </div>

      <!-- Leaderboard -->
      <div id="leaderboardPanel" class="hidden flex-1 flex-col main-sidebar">
        <h2 class="text-[#E8DCC8] text-xl mb-6">🏆 Leaderboard</h2>
        <div id="leaderboard" class="space-y-3"></div>
      </div>

      <!-- Games -->
      <div id="pollsPanel" class="hidden flex-1 flex-col main-sidebar">
        <h2 class="text-[#E8DCC8] text-xl mb-6">🎮 Games</h2>
        <div class="glass p-6">
          <h3 class="text-lg mb-3">Yuta Abe Experience</h3>
          <button onclick="openGame()" class="w-full py-5 bg-[#E8DCC8] text-[#0a0e1a] font-bold rounded-2xl">▶️ Play Game</button>
        </div>
        <div class="mt-10">
          <h3 class="text-[#E8DCC8] mb-4">🗳️ Active Poll</h3>
          <div id="activePoll" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Secret Admin Key -->
  <div class="secret-key" onclick="showAdminQuickLogin()">
    <i class="fas fa-key"></i>
  </div>

  <!-- Admin Modal -->
  <div id="adminLoginModal" class="hidden fixed inset-0 bg-black/90 z-[2000] flex items-center justify-center">
    <div class="glass p-8 rounded-3xl w-full max-w-md">
      <h3 class="text-xl mb-6 text-center">🔑 Admin Quick Login</h3>
      <input type="email" id="adminEmail" value="admin_x" class="w-full p-4 mb-4 bg-transparent border border-[#E8DCC8]/30 rounded-2xl">
      <input type="password" id="adminPassword" value="lanre@132009" class="w-full p-4 mb-6 bg-transparent border border-[#E8DCC8]/30 rounded-2xl">
      <button onclick="quickAdminLogin()" class="w-full py-4 bg-[#E8DCC8] text-[#0a0e1a] font-bold rounded-2xl">Login as Admin</button>
      <button onclick="hideAdminQuickLogin()" class="w-full mt-3 py-4 border border-[#E8DCC8]/50 text-[#E8DCC8] rounded-2xl">Cancel</button>
    </div>
  </div>

  <!-- Game Modal -->
  <div id="gameModal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div style="background:rgba(12,16,28,0.98); padding:16px 24px; display:flex; justify-content:space-between; border-bottom:1px solid rgba(245,230,211,0.1);">
      <button onclick="closeGame()" style="color:#E8DCC8">← Back</button>
      <span>Yuta Abe Experience</span>
      <button onclick="closeGame()" style="color:#E8DCC8">✕</button>
    </div>
    <iframe id="gameFrame" class="flex-1" allowfullscreen></iframe>
  </div>

  <script>
    // Pixie Dust
    (function initPixieDust() {
      const canvas = document.getElementById('pixie-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      function randomBetween(a, b) { return a + Math.random() * (b - a); }
      function createParticle() {
        return { x: randomBetween(0, W), y: randomBetween(-20, -2), radius: randomBetween(0.8, 2.2), speed: randomBetween(0.4, 1.2), drift: randomBetween(-0.3, 0.3), opacity: randomBetween(0.5, 1.0), fade: randomBetween(0.003, 0.008) };
      }
      for (let i = 0; i < 90; i++) particles.push(createParticle());
      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(245, 230, 211, ${p.opacity})`;
          ctx.fill();
          p.y += p.speed; p.x += p.drift; p.opacity -= p.fade;
          if (p.y > H + 10 || p.opacity <= 0) particles[i] = createParticle();
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // Theme System
    let currentTheme = 'classic';
    function toggleTheme() {
      currentTheme = currentTheme === 'classic' ? 'sunset' : 'classic';
      const video = document.getElementById('theme-video');
      if (currentTheme === 'sunset') {
        video.style.display = 'block';
        video.play();
      } else {
        video.style.display = 'none';
        video.pause();
      }
    }

    // Login & Core
    const token = localStorage.getItem('token');
    const myName = localStorage.getItem('name');
    if (!token || !myName) window.location.replace('/login');

    document.getElementById('myName').textContent = myName;
    if (localStorage.getItem('isAdmin') === 'true') document.getElementById('adminBtn').classList.remove('hidden');

    const socket = io();
    socket.emit('login', { name: myName });

    // Typing
    let typingTimeout;
    document.getElementById('messageInput').addEventListener('input', () => {
      socket.emit('typing', { name: myName });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stopTyping'), 1500);
    });

    socket.on('userTyping', data => {
      if (data.name !== myName) document.getElementById('typingIndicator').textContent = `${data.name} is typing...`;
    });
    socket.on('userStopTyping', () => document.getElementById('typingIndicator').textContent = '');

    // Messages + Reactions
    function addMessage(msg, isMine) {
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'sent' : 'received'}`;
      div.innerHTML = `
        <strong>${msg.name}</strong><br>
        ${msg.text}
        <div class="reactions mt-2">
          <span class="reaction" onclick="addReaction(this, '❤️')">❤️</span>
          <span class="reaction" onclick="addReaction(this, '🔥')">🔥</span>
          <span class="reaction" onclick="addReaction(this, '😂')">😂</span>
          <span class="reaction" onclick="addReaction(this, '👏')">👏</span>
        </div>
      `;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    }

    function addReaction(el, emoji) {
      el.parentElement.innerHTML += `<span style="margin-left:8px;">${emoji}</span>`;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      const msg = { name: myName, text: input.value };
      socket.emit('sendMessage', msg);
      addMessage(msg, true);
      input.value = '';
    }

    socket.on('receiveMessage', msg => addMessage(msg, false));

    // Admin Quick Login
    function showAdminQuickLogin() { document.getElementById('adminLoginModal').classList.remove('hidden'); }
    function hideAdminQuickLogin() { document.getElementById('adminLoginModal').classList.add('hidden'); }
    async function quickAdminLogin() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('name', data.name);
          localStorage.setItem('email', data.email);
          localStorage.setItem('isAdmin', data.isAdmin);
          hideAdminQuickLogin();
          alert("✅ Admin Login Successful!");
          window.location.reload();
        } else {
          alert("❌ Invalid credentials");
        }
      } catch (e) { alert("Connection error"); }
    }

    function logout() { localStorage.clear(); window.location.replace('/login'); }
    function goToAdmin() { window.location.href = '/admin'; }

    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === tab));
      document.getElementById('homePanel').classList.toggle('hidden', tab !== 0);
      document.getElementById('leaderboardPanel').classList.toggle('hidden', tab !== 1);
      document.getElementById('pollsPanel').classList.toggle('hidden', tab !== 2);
      if (tab === 1) loadLeaderboard();
    }

    function openGame() {
      document.getElementById('gameModal').classList.remove('hidden');
      document.getElementById('gameFrame').src = "https://yutaabe.com/";
    }
    function closeGame() {
      document.getElementById('gameModal').classList.add('hidden');
      document.getElementById('gameFrame').src = '';
    }

    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      let html = data.map((item, i) => `
        <div class="glass p-4 rounded-2xl mb-3 flex justify-between">
          <span>${['🥇','🥈','🥉'][i] || '🏅'} ${item.name}</span>
          <span>${item.points} pts (${item.year})</span>
        </div>
      `).join('');
      document.getElementById('leaderboard').innerHTML = html || '<p>No rankings yet...</p>';
    }

    // Initialize Video
    document.getElementById('theme-video').src = "/AI Video.mp4";

    loadLeaderboard();
  </script>
</body>
</html>
