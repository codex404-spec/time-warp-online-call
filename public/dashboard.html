<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Chat</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    body { margin:0; font-family: Arial; background: #0f172a; color: white; }
    .app { display: flex; height: 100vh; }
    .sidebar { width: 320px; background: #1e2937; padding: 20px; border-right: 1px solid #334155; overflow-y: auto; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .header { padding: 15px; background: #1e2937; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
    .messages { flex: 1; padding: 20px; overflow-y: auto; background: #0f172a; }
    .message { margin: 10px 0; padding: 12px 16px; border-radius: 12px; max-width: 75%; position: relative; }
    .sent { background: #22d3ee; color: black; margin-left: auto; }
    .received { background: #334155; }
    .input-area { padding: 15px; background: #1e2937; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input { flex: 1; padding: 14px; border: none; border-radius: 8px; }
    button { padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; }
    .send-btn { background: #22d3ee; color: black; }
    .record-btn { background: #ef4444; }
    .upload-btn { background: #8b5cf6; }
    .call-btn { background: #4ade80; }
    .user-item { padding: 12px; margin: 4px 0; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
    .user-item.clickable { cursor: pointer; }
    .user-item.clickable:hover { background: #2d3f55; }
    .user-item.self { background: #1a3a2a; cursor: default; }
    .online-dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px #4ade80; }
    .user-label { display: flex; flex-direction: column; gap: 2px; }
    .user-status { font-size: 11px; color: #4ade80; }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <h2>🟢 Online Users</h2>
      <div id="onlineUsers"></div>
    </div>

    <div class="chat-area">
      <div class="header">
        <h2 id="chatHeader">Select someone to chat</h2>
        <div style="display:flex; align-items:center; gap:16px;">
          <span>Welcome, <b id="myName"></b></span>
          <button onclick="logout()" style="background:#ef4444; color:white; padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Logout</button>
        </div>
      </div>
      
      <div class="messages" id="messages"></div>
      
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button class="send-btn" onclick="sendMessage()">Send</button>
        <button class="record-btn" id="recordBtn" onclick="toggleVoiceRecording()">🎤</button>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="call-btn" onclick="startAudioCall()">🎙️ Call</button>
        <button onclick="startVideoCall()" style="background:#f97316;">📹 Video</button>
      </div>
      <input type="file" id="fileInput" style="display:none" accept="image/*,video/*" />
    </div>
  </div>

  <script>
    // Guard: redirect to login if no token is present
    (function requireAuth() {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.replace('/login');
      }
    })();

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('name');
      window.location.replace('/login');
    }

    const socket = io();
    let currentChatWith = null;
    let myName = localStorage.getItem('name') || "You";
    let mediaRecorder;
    let audioChunks = [];

    document.getElementById('myName').textContent = myName;
    socket.emit('login', { name: myName });

    socket.on('onlineUsers', (users) => {
      const container = document.getElementById('onlineUsers');
      container.innerHTML = '';
      users.forEach(user => {
        const isSelf = user.name === myName;
        const div = document.createElement('div');
        div.className = `user-item ${isSelf ? 'self' : 'clickable'}`;
        div.innerHTML = `
          <span class="online-dot"></span>
          <span class="user-label">
            <strong>${user.name}${isSelf ? ' <span style="color:#94a3b8;font-weight:normal;font-size:12px;">(You)</span>' : ''}</strong>
            <span class="user-status">● Active now</span>
          </span>
        `;
        if (!isSelf) {
          div.onclick = () => startChat(user);
        }
        container.appendChild(div);
      });
    });

    function startChat(user) {
      currentChatWith = user;
      document.getElementById('chatHeader').textContent = `💬 ${user.name}`;
      document.getElementById('messages').innerHTML = '';
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChatWith) return;

      const msg = { from: myName, to: currentChatWith.name, text, type: 'text', time: new Date().toLocaleTimeString() };
      socket.emit('sendMessage', msg);
      addMessage(msg, true);
      input.value = '';
    }

    function addMessage(msg, isMine) {
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'sent' : 'received'}`;
      div.textContent = `${msg.from}: ${msg.text || '[Media]'}`;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    }

    socket.on('receiveMessage', (msg) => {
      if (currentChatWith && msg.from === currentChatWith.name) {
        addMessage(msg, false);
      }
    });

    // Voice Recording
    async function toggleVoiceRecording() {
      const btn = document.getElementById('recordBtn');
      if (!mediaRecorder) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          // For now we show alert (later we can upload)
          alert("Voice message recorded! (Upload feature coming next)");
          audioChunks = [];
        };
        mediaRecorder.start();
        btn.textContent = "⏹️ Stop";
      } else {
        mediaRecorder.stop();
        mediaRecorder = null;
        btn.textContent = "🎤";
      }
    }

    function startAudioCall() {
      if (!currentChatWith) return alert("Select a user first");
      alert(`📞 Starting Audio Call with ${currentChatWith.name}... (Full WebRTC coming soon)`);
    }

    function startVideoCall() {
      if (!currentChatWith) return alert("Select a user first");
      alert(`📹 Starting Video Call with ${currentChatWith.name}...`);
    }

    // File Upload (Basic)
    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        alert(`📁 File "${e.target.files[0].name}" selected. Upload feature in next update.`);
      }
    });

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
