<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Chat</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Georgia', serif; background: #0a0e1a; color: #F5E6D3; overflow: hidden; }

    /* ── Pixie Dust Canvas ── */
    #pixie-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      background: rgba(12, 16, 28, 0.92);
      padding: 20px;
      border-right: 1px solid rgba(245,230,211,0.1);
      overflow-y: auto;
      backdrop-filter: blur(8px);
      flex-shrink: 0;
    }
    .sidebar h2 {
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: #E8DCC8;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    /* ── Chat Area ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .header {
      padding: 14px 20px;
      background: rgba(12, 16, 28, 0.92);
      border-bottom: 1px solid rgba(245,230,211,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(8px);
    }
    .header h2 { font-size: 1rem; letter-spacing: 0.04em; color: #E8DCC8; }

    /* ── Messages ── */
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(245,230,211,0.15); border-radius: 4px; }

    .message {
      padding: 10px 15px;
      border-radius: 12px;
      max-width: 85%;
      font-size: 0.92rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .sent {
      background: #E8DCC8;
      color: #0a0e1a;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .received {
      background: rgba(245,230,211,0.08);
      border: 1px solid rgba(245,230,211,0.12);
      color: #F5E6D3;
      border-bottom-left-radius: 4px;
    }

    /* ── Input Area ── */
    .input-area {
      padding: 14px 16px;
      background: rgba(12, 16, 28, 0.92);
      border-top: 1px solid rgba(245,230,211,0.1);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      backdrop-filter: blur(8px);
    }
    .input-area input {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      border: 1px solid rgba(245,230,211,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #F5E6D3;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-area input::placeholder { color: rgba(245,230,211,0.35); }
    .input-area input:focus {
      border-color: rgba(245,230,211,0.45);
      box-shadow: 0 0 0 3px rgba(245,230,211,0.07);
    }

    /* ── Buttons ── */
    button {
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: bold;
      letter-spacing: 0.03em;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    button:hover  { opacity: 0.88; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .send-btn    { background: #E8DCC8; color: #0a0e1a; }
    .send-btn:hover { background: #F5E6D3; box-shadow: 0 4px 16px rgba(245,230,211,0.2); opacity: 1; }
    .record-btn  { background: #E8DCC8; color: #0a0e1a; }
    .upload-btn  { background: #E8DCC8; color: #0a0e1a; }
    .call-btn    { background: #E8DCC8; color: #0a0e1a; }
    .logout-btn  { background: #7f1d1d; color: #fca5a5; padding: 8px 16px; font-size: 0.82rem; }

    /* ── User List ── */
    .user-item {
      padding: 11px 12px;
      margin: 3px 0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    .user-item.clickable { cursor: pointer; }
    .user-item.clickable:hover { background: rgba(245,230,211,0.07); }
    .user-item.self { background: rgba(245,230,211,0.04); cursor: default; }

    .online-dot {
      width: 9px; height: 9px;
      background: #86efac;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px #86efac;
    }
    .user-label { display: flex; flex-direction: column; gap: 2px; }
    .user-label strong { font-size: 0.9rem; color: #F5E6D3; }
    .user-status { font-size: 10px; color: #86efac; letter-spacing: 0.03em; }

    /* ── Call Modal ── */
    .call-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 26, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .call-modal.active { display: flex; }
    .call-container {
      width: 90%;
      max-width: 1000px;
      background: rgba(12, 16, 28, 0.95);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid rgba(245,230,211,0.1);
    }
    .videos-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .video-wrapper {
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .call-controls { display: flex; gap: 12px; justify-content: center; }
    .end-call-btn { background: #7f1d1d; color: #fca5a5; padding: 12px 28px; }
    .call-btn-small { background: rgba(245,230,211,0.1); color: #F5E6D3; }
  </style>
</head>
<body>
  <canvas id="pixie-canvas"></canvas>

  <div class="app">
    <div class="sidebar">
      <h2>✦ Online Users</h2>
      <div id="onlineUsers"></div>
    </div>

    <div class="chat-area">
      <div class="header">
        <h2 id="chatHeader">Select someone to chat</h2>
        <div style="display:flex; align-items:center; gap:14px;">
          <span style="font-size:0.88rem; color:rgba(245,230,211,0.7);">Welcome, <b style="color:#F5E6D3;" id="myName"></b></span>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type a message…" />
        <button class="send-btn"    onclick="sendMessage()">Send</button>
        <button class="record-btn"  id="recordBtn" onclick="toggleVoiceRecording()">🎤</button>
        <button class="upload-btn"  onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="call-btn"    onclick="startAudioCall()">🎙️ Call</button>
        <button class="send-btn" onclick="startVideoCall()">📹 Video</button>
      </div>
      <input type="file" id="fileInput" style="display:none" accept="image/*,video/*" />
    </div>
  </div>

  <!-- Call Modal -->
  <div class="call-modal" id="callModal">
    <div class="call-container">
      <div class="videos-container">
        <div class="video-wrapper">
          <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div class="video-wrapper">
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </div>
      <div class="call-controls">
        <button class="call-btn-small" id="toggleAudioBtn" onclick="toggleAudio()">🔊 Audio</button>
        <button class="call-btn-small" id="toggleVideoBtn" onclick="toggleVideo()">📹 Video</button>
        <button class="end-call-btn" onclick="endCall()">⏹️ End Call</button>
      </div>
    </div>
  </div>

  <script>
    /* ── Pixie Dust ── */
    (function initPixieDust() {
      const canvas = document.getElementById('pixie-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function randomBetween(a, b) { return a + Math.random() * (b - a); }

      function createParticle() {
        return {
          x:       randomBetween(0, W),
          y:       randomBetween(-20, -2),
          radius:  randomBetween(0.8, 2.2),
          speed:   randomBetween(0.4, 1.2),
          drift:   randomBetween(-0.3, 0.3),
          opacity: randomBetween(0.5, 1.0),
          fade:    randomBetween(0.003, 0.008),
        };
      }

      const PARTICLE_COUNT = 90;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = createParticle();
        p.y = randomBetween(0, H);
        particles.push(p);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
          ctx.fill();

          p.y       += p.speed;
          p.x       += p.drift;
          p.opacity -= p.fade;

          if (p.y > H + 10 || p.opacity <= 0) {
            particles[i] = createParticle();
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── Auth Guard ── */
    (function requireAuth() {
      const token = localStorage.getItem('token');
      if (!token) window.location.replace('/login');
    })();

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('name');
      window.location.replace('/login');
    }

    const socket = io();
    let currentChatWith = null;
    let myName = localStorage.getItem('name') || "You";
    let mediaRecorder;
    let audioChunks = [];

    let localStream;
    let remoteStream;
    let peerConnection;
    let mySocketId;
    let isAudioEnabled = true;
    let isVideoEnabled = true;
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    document.getElementById('myName').textContent = myName;
    socket.emit('login', { name: myName });

    socket.on('connect', () => {
      mySocketId = socket.id;
    });

    socket.on('onlineUsers', (users) => {
      const container = document.getElementById('onlineUsers');
      container.innerHTML = '';
      users.forEach(user => {
        const isSelf = user.name === myName;
        const div = document.createElement('div');
        div.className = `user-item ${isSelf ? 'self' : 'clickable'}`;
        div.dataset.socketId = user.socketId;
        div.innerHTML = `
          <span class="online-dot"></span>
          <span class="user-label">
            <strong>${user.name}${isSelf ? ' <span style="color:rgba(245,230,211,0.4);font-weight:normal;font-size:11px;">(You)</span>' : ''}</strong>
            <span class="user-status">● Active now</span>
          </span>
        `;
        if (!isSelf) div.onclick = () => startChat(user);
        container.appendChild(div);
      });
    });

    socket.on('offer', async (data) => {
      if (!confirm(`${data.fromName} is calling! Accept?`)) {
        socket.emit('endCall', { targetSocketId: data.fromSocketId });
        return;
      }
      await startCall(false, data.callType, data.fromSocketId, data.fromName);
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      socket.emit('answer', {
        targetSocketId: data.fromSocketId,
        answer,
        fromName: myName,
        fromSocketId: mySocketId
      });
    });

    socket.on('answer', async (data) => {
      await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
    });

    socket.on('iceCandidate', async (data) => {
      if (data.candidate) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    });

    socket.on('endCall', () => {
      endCall();
    });

    function startChat(user) {
      currentChatWith = user;
      document.getElementById('chatHeader').textContent = `💬 ${user.name}`;
      document.getElementById('messages').innerHTML = '';
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChatWith) return;

      const msg = { from: myName, to: currentChatWith.name, text, type: 'text', time: new Date().toLocaleTimeString() };
      socket.emit('sendMessage', msg);
      addMessage(msg, true);
      input.value = '';
    }

    function addMessage(msg, isMine) {
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'sent' : 'received'}`;
      
      if (msg.type === 'audio') {
        const label = document.createElement('div');
        label.textContent = `${msg.from}:`;
        label.style.marginBottom = '6px';
        label.style.fontSize = '0.82rem';
        label.style.opacity = '0.8';
        div.appendChild(label);
        
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = msg.audio;
        audio.style.width = '100%';
        audio.style.minWidth = '220px';
        audio.style.maxWidth = '100%';
        audio.style.height = '40px';
        div.appendChild(audio);
      } else if (msg.type === 'image') {
        const label = document.createElement('div');
        label.textContent = `${msg.from}:`;
        label.style.marginBottom = '6px';
        label.style.fontSize = '0.82rem';
        label.style.opacity = '0.8';
        div.appendChild(label);
        
        const img = document.createElement('img');
        img.src = msg.image;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '8px';
        img.style.cursor = 'pointer';
        img.onclick = () => window.open(msg.image, '_blank');
        div.appendChild(img);
      } else {
        div.textContent = `${msg.from}: ${msg.text || '[Media]'}`;
      }
      
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    }

    socket.on('receiveMessage', (msg) => {
      if (currentChatWith && msg.from === currentChatWith.name) {
        addMessage(msg, false);
      }
    });

    async function toggleVoiceRecording() {
      const btn = document.getElementById('recordBtn');
      if (!mediaRecorder) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            const audioBase64 = reader.result;
            const msg = { 
              from: myName, 
              to: currentChatWith ? currentChatWith.name : 'All', 
              audio: audioBase64, 
              type: 'audio', 
              time: new Date().toLocaleTimeString() 
            };
            socket.emit('sendMessage', msg);
            addMessage(msg, true);
          };
          reader.readAsDataURL(audioBlob);
          audioChunks = [];
        };
        mediaRecorder.start();
        btn.textContent = "⏹️ Stop";
      } else {
        mediaRecorder.stop();
        mediaRecorder = null;
        btn.textContent = "🎤";
      }
    }

    async function startCall(isInitiator, callType, targetSocketId, targetName) {
      const constraints = callType === 'video' 
        ? { audio: true, video: true } 
        : { audio: true, video: false };
      
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
      document.getElementById('localVideo').srcObject = localStream;
      
      remoteStream = new MediaStream();
      document.getElementById('remoteVideo').srcObject = remoteStream;
      
      peerConnection = new RTCPeerConnection(config);
      
      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });
      
      peerConnection.ontrack = (event) => {
        event.streams[0].getTracks().forEach(track => {
          remoteStream.addTrack(track);
        });
      };
      
      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('iceCandidate', {
            targetSocketId,
            candidate: event.candidate,
            fromSocketId: mySocketId
          });
        }
      };
      
      if (isInitiator) {
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.emit('offer', {
          targetSocketId,
          offer,
          callType,
          fromName: myName,
          fromSocketId: mySocketId
        });
      }
      
      document.getElementById('callModal').classList.add('active');
      isAudioEnabled = true;
      isVideoEnabled = callType === 'video';
    }

    function startAudioCall() {
      if (!currentChatWith || !currentChatWith.socketId) return alert("Select a user first");
      startCall(true, 'audio', currentChatWith.socketId, currentChatWith.name);
    }

    function startVideoCall() {
      if (!currentChatWith || !currentChatWith.socketId) return alert("Select a user first");
      startCall(true, 'video', currentChatWith.socketId, currentChatWith.name);
    }

    function toggleAudio() {
      if (!localStream) return;
      localStream.getAudioTracks().forEach(track => {
        track.enabled = !track.enabled;
      });
      isAudioEnabled = !isAudioEnabled;
      document.getElementById('toggleAudioBtn').textContent = isAudioEnabled ? '🔊 Audio' : '� Muted';
    }

    function toggleVideo() {
      if (!localStream) return;
      localStream.getVideoTracks().forEach(track => {
        track.enabled = !track.enabled;
      });
      isVideoEnabled = !isVideoEnabled;
      document.getElementById('toggleVideoBtn').textContent = isVideoEnabled ? '📹 Video' : '📵 Video Off';
    }

    function endCall() {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      if (remoteStream) {
        remoteStream.getTracks().forEach(track => track.stop());
        remoteStream = null;
      }
      document.getElementById('callModal').classList.remove('active');
      
      if (currentChatWith && currentChatWith.socketId) {
        socket.emit('endCall', { targetSocketId: currentChatWith.socketId });
      }
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
          const msg = {
            from: myName,
            to: currentChatWith ? currentChatWith.name : 'All',
            image: reader.result,
            type: 'image',
            time: new Date().toLocaleTimeString()
          };
          socket.emit('sendMessage', msg);
          addMessage(msg, true);
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      }
    });

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
