<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Connect</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Georgia', serif; 
      background: #0a0e1a; 
      color: #F5E6D3; 
      overflow: hidden; 
    }

    #pixie-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
    }

    .app { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* Navigation Sidebar */
    .nav-sidebar {
      width: 240px;
      background: rgba(12, 16, 28, 0.98);
      padding: 24px 12px;
      border-right: 1px solid rgba(245,230,211,0.1);
      display: flex;
      flex-direction: column;
    }

    .nav-item {
      padding: 14px 20px;
      margin: 4px 8px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #E8DCC8;
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(245,230,211,0.12);
      color: #F5E6D3;
    }
    .nav-item.active { background: rgba(245,230,211,0.18); font-weight: bold; }

    .main-content { display: flex; flex: 1; }

    .main-sidebar {
      width: 300px;
      background: rgba(12, 16, 28, 0.95);
      padding: 20px;
      border-right: 1px solid rgba(245,230,211,0.1);
      overflow-y: auto;
    }

    .chat-area { flex: 1; display: flex; flex-direction: column; }

    .header {
      padding: 16px 24px;
      background: rgba(12, 16, 28, 0.95);
      border-bottom: 1px solid rgba(245,230,211,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .glass {
      background: rgba(245,230,211,0.04);
      border: 1px solid rgba(245,230,211,0.1);
      border-radius: 16px;
    }

    .leaderboard-item, .poll-option {
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 12px;
      background: rgba(245,230,211,0.06);
      cursor: pointer;
      transition: 0.2s;
    }
    .poll-option:hover { background: rgba(245,230,211,0.15); }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .send-btn, .record-btn, .call-btn { background: #E8DCC8; color: #0a0e1a; }
    .logout-btn { background: #7f1d1d; color: #fca5a5; }
    .admin-btn { background: #5c3311; color: #F5E6D3; }
  </style>
</head>
<body>
  <canvas id="pixie-canvas"></canvas>
  
  <div class="app">
    <!-- Navigation Sidebar -->
    <div class="nav-sidebar">
      <h2 style="color:#E8DCC8; padding: 0 16px 20px; font-size:1.4rem;">✦ Time Warp</h2>
      
      <div onclick="switchTab(0)" class="nav-item active"><i class="fas fa-home"></i> Home</div>
      <div onclick="switchTab(1)" class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</div>
      <div onclick="switchTab(2)" class="nav-item"><i class="fas fa-gamepad"></i> Games</div>

      <div style="margin-top: auto; padding: 16px;">
        <button onclick="goToAdmin()" id="adminBtn" class="admin-btn w-full mb-3 hidden">⚙️ Admin Panel</button>
        <button onclick="logout()" class="logout-btn w-full">Logout</button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Chat Area -->
      <div id="homePanel" class="chat-area flex-1 flex flex-col">
        <div class="header">
          <h2 id="chatHeader">Select someone to chat</h2>
          <div>Welcome, <b id="myName"></b></div>
        </div>
        <div id="messages" class="flex-1 p-6 overflow-y-auto"></div>
        <div class="p-4 border-t border-white/10 bg-[#0a0e1a]">
          <div class="flex gap-3">
            <input type="text" id="messageInput" class="flex-1 bg-transparent border border-[#E8DCC8]/30 rounded-2xl px-5 py-4 focus:outline-none text-[#F5E6D3]" placeholder="Type a message...">
            <button onclick="sendMessage()" class="send-btn">Send</button>
          </div>
        </div>
      </div>

      <!-- Leaderboard Panel -->
      <div id="leaderboardPanel" class="hidden flex-1 flex-col main-sidebar">
        <h2 class="text-[#E8DCC8] text-xl mb-6">🏆 Leaderboard</h2>
        <div id="leaderboard" class="space-y-3"></div>
      </div>

      <!-- Games Panel -->
      <div id="pollsPanel" class="hidden flex-1 flex-col main-sidebar">
        <h2 class="text-[#E8DCC8] text-xl mb-6">🎮 Games</h2>
        
        <div class="glass p-6">
          <h3 class="text-lg mb-3">Yuta Abe Experience</h3>
          <p class="opacity-70 mb-6">Interactive visual experience</p>
          <button onclick="openGame()" class="w-full py-5 bg-[#E8DCC8] text-[#0a0e1a] font-bold text-lg rounded-2xl">
            ▶️ Play Game
          </button>
        </div>

        <div class="mt-10">
          <h3 class="text-[#E8DCC8] mb-4">🗳️ Active Poll</h3>
          <div id="activePoll" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Modal -->
  <div id="gameModal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
    <div class="header" style="background: rgba(12,16,28,0.98); padding: 16px 24px; border-bottom: 1px solid rgba(245,230,211,0.1);">
      <button onclick="closeGame()" style="color:#E8DCC8;">← Back</button>
      <span>Yuta Abe Experience</span>
      <button onclick="closeGame()" style="color:#E8DCC8;">✕</button>
    </div>
    <iframe id="gameFrame" class="flex-1" allowfullscreen></iframe>
  </div>

  <script>
    // Pixie Dust Effect
    (function initPixieDust() {
      const canvas = document.getElementById('pixie-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      function randomBetween(a, b) { return a + Math.random() * (b - a); }
      function createParticle() {
        return { x: randomBetween(0, W), y: randomBetween(-20, -2), radius: randomBetween(0.8, 2.2), speed: randomBetween(0.4, 1.2), drift: randomBetween(-0.3, 0.3), opacity: randomBetween(0.5, 1.0), fade: randomBetween(0.003, 0.008) };
      }
      for (let i = 0; i < 90; i++) particles.push(createParticle());
      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(245, 230, 211, ${p.opacity})`;
          ctx.fill();
          p.y += p.speed; p.x += p.drift; p.opacity -= p.fade;
          if (p.y > H + 10 || p.opacity <= 0) particles[i] = createParticle();
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();

    // Check Login
    const token = localStorage.getItem('token');
    const myName = localStorage.getItem('name');
    const isAdminUser = localStorage.getItem('isAdmin') === 'true';

    if (!token || !myName) {
      window.location.replace('/login');
    }

    document.getElementById('myName').textContent = myName;
    if (isAdminUser) document.getElementById('adminBtn').classList.remove('hidden');

    function logout() {
      localStorage.clear();
      window.location.replace('/login');
    }
    function goToAdmin() { window.location.href = '/admin'; }

    const socket = io();
    socket.emit('login', { name: myName });

    // Tab Switching
    function switchTab(tab) {
      document.querySelectorAll('.nav-item').forEach((el, i) => el.classList.toggle('active', i === tab));
      document.getElementById('homePanel').classList.toggle('hidden', tab !== 0);
      document.getElementById('leaderboardPanel').classList.toggle('hidden', tab !== 1);
      document.getElementById('pollsPanel').classList.toggle('hidden', tab !== 2);
      if (tab === 1) loadLeaderboard();
    }

    function openGame() {
      document.getElementById('gameModal').classList.remove('hidden');
      document.getElementById('gameFrame').src = "https://yutaabe.com/";
    }

    function closeGame() {
      document.getElementById('gameModal').classList.add('hidden');
      document.getElementById('gameFrame').src = '';
    }

    // Leaderboard
    async function loadLeaderboard() {
      const res = await fetch('/api/leaderboard');
      const data = await res.json();
      let html = data.map((item, i) => `
        <div class="leaderboard-item">
          <span>${['🥇','🥈','🥉'][i] || '🏅'} ${item.name}</span>
          <span class="${['gold','silver','bronze'][i] || ''}">${item.points} pts (${item.year})</span>
        </div>
      `).join('');
      document.getElementById('leaderboard').innerHTML = html || '<p>No rankings yet...</p>';
    }

    // Poll & Chat (basic)
    let currentPoll = null;
    socket.on('newPoll', poll => { currentPoll = poll; showPoll(poll); });
    socket.on('pollClosed', () => loadLeaderboard());

    function showPoll(poll) {
      let html = `<div class="glass p-6"><h3>${poll.question}</h3>`;
      poll.options.forEach(opt => {
        html += `<div onclick="vote('${opt}')" class="poll-option">${opt}</div>`;
      });
      document.getElementById('activePoll').innerHTML = html;
    }

    async function vote(option) {
      await fetch('/api/vote', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ option })
      });
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      socket.emit('sendMessage', { name: myName, text: input.value });
      input.value = '';
    }

    socket.on('receiveMessage', msg => {
      const div = document.createElement('div');
      div.style.margin = '8px 0';
      div.innerHTML = `<strong>${msg.name}:</strong> ${msg.text}`;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 99999;
    });

    loadLeaderboard();
  </script>
</body>
</html>
