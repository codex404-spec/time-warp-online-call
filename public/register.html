<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Time Warp</title>
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; padding: 50px; }
    input, button { padding: 12px; margin: 10px; width: 300px; border-radius: 8px; }
    button { background: #22d3ee; color: black; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Time Warp Online Call</h1>
  <h2>Create Account</h2>
  <input type="text" id="name" placeholder="Full Name" /><br>
  <input type="email" id="email" placeholder="Email" /><br>
  <input type="password" id="password" placeholder="Password" /><br>
  <button onclick="register()">Register</button>
  <p>Already have account? <a href="/login" style="color:#22d3ee">Login</a></p>

  <script>
    async function register() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, email, password})
      });
      const data = await res.json();

      if (data.success) {
        alert("Account created successfully! Please login.");
        window.location.href = '/login';
      } else {
        alert(data.error);
      }
    }
  </script>
</body>
</html>
