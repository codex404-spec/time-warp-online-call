<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Time Warp</title>
  <style>
    body { 
      font-family: 'Georgia', serif; 
      background: #0a0e1a; 
      color: #F5E6D3; 
      margin: 0; 
      padding: 0; 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }
    .container { 
      max-width: 420px; 
      width: 90%; 
      padding: 50px 40px; 
      background: rgba(12,16,28,0.95); 
      border-radius: 20px; 
      border: 1px solid rgba(245,230,211,0.2);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    h1 { text-align: center; margin-bottom: 30px; font-size: 2.2rem; }
    input { 
      width: 100%; 
      padding: 16px; 
      margin: 12px 0; 
      background: rgba(255,255,255,0.05); 
      border: 1px solid rgba(245,230,211,0.3); 
      color: #F5E6D3; 
      border-radius: 12px; 
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: #E8DCC8; }
    button { 
      width: 100%; 
      padding: 16px; 
      background: #E8DCC8; 
      color: #0a0e1a; 
      border: none; 
      border-radius: 12px; 
      font-weight: bold; 
      font-size: 1.1rem; 
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #F5E6D3; }
    .link { text-align: center; margin-top: 25px; color: #E8DCC8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✦ Time Warp</h1>
    <h2 style="text-align:center; margin-bottom:20px;">Welcome Back</h2>
    
    <input type="email" id="email" placeholder="Email address" autocomplete="off">
    <input type="password" id="password" placeholder="Password" autocomplete="new-password">
    
    <button onclick="login()">Login</button>
    
    <div class="link">
      Don't have an account? <a href="/register" style="color:#E8DCC8; text-decoration:underline;">Create Account</a>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        alert("Please enter email and password");
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          // Save all important data
          localStorage.setItem('token', data.token);
          localStorage.setItem('name', data.name);
          localStorage.setItem('email', data.email);
          localStorage.setItem('isAdmin', data.isAdmin);

          window.location.href = '/dashboard';
        } else {
          alert(data.error || "Invalid email or password");
        }
      } catch (err) {
        alert("Server error. Please try again.");
      }
    }

    // Allow pressing Enter to login
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
