<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Time Warp</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0f172a; 
      color: white; 
      text-align: center; 
      padding: 50px; 
    }
    input, button { 
      padding: 12px; 
      margin: 10px; 
      width: 300px; 
      border-radius: 8px; 
    }
    button { 
      background: #22d3ee; 
      color: black; 
      font-weight: bold; 
      cursor: pointer; 
    }
    #loginForm { display: none; }
  </style>
</head>
<body>
  <h1>🚀 Time Warp Online Call</h1>

  <div id="loginForm">
    <h2>Login</h2>
    
    <input type="email" id="email" placeholder="Email" /><br>
    <input type="password" id="password" placeholder="Password" /><br>
    <button onclick="login()">Login</button>
    
    <p>Don't have an account? 
      <a href="/register" style="color:#22d3ee; font-weight:bold;">Create Account</a>
    </p>
  </div>

  <script>
    // On page load: if a token already exists, go straight to the dashboard.
    // The dashboard will validate the token and redirect back here if it's expired.
    (function checkExistingSession() {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.replace('/dashboard');
      } else {
        document.getElementById('loginForm').style.display = 'block';
      }
    })();

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
      });
      
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('name', data.name);
        window.location.href = '/dashboard';
      } else {
        alert(data.error || "Login failed");
      }
    }
  </script>
</body>
</html>
