<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Warp - Auth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Georgia&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0e1a;
    }
    
    .glass {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(245, 230, 211, 0.15);
    }

    .input-neon {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(165, 180, 252, 0.3);
      transition: all 0.3s;
    }
    .input-neon:focus {
      border-color: #a5b4fc;
      box-shadow: 0 0 0 3px rgba(165, 180, 252, 0.15);
      outline: none;
    }
    .input-error {
      animation: shake 0.4s ease-in-out;
      border-color: #f87171 !important;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .btn-neon {
      background: linear-gradient(135deg, #6366f1, #a5b4fc);
      transition: all 0.3s;
    }
    .btn-neon:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(165, 180, 252, 0.3);
    }

    .tab {
      transition: all 0.3s;
    }
    .tab.active {
      border-bottom: 3px solid #a5b4fc;
      color: #a5b4fc;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="glass rounded-3xl p-8 shadow-2xl">
      <!-- Logo -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-[#E8DCC8] flex items-center justify-center gap-3">
          ✦ Time Warp
        </h1>
        <p class="text-[#F5E6D3]/70 mt-2">Connect • Chat • Compete</p>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-white/10 mb-8">
        <button onclick="switchTab(0)" id="loginTab" 
                class="tab active flex-1 py-4 text-lg font-medium">Sign In</button>
        <button onclick="switchTab(1)" id="registerTab" 
                class="tab flex-1 py-4 text-lg font-medium">Create Account</button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="space-y-5">
          <div>
            <input type="email" id="loginEmail" 
                   class="input-neon w-full px-5 py-4 rounded-2xl text-white placeholder:text-white/50"
                   placeholder="Email address" autocomplete="off">
          </div>
          <div>
            <input type="password" id="loginPassword" 
                   class="input-neon w-full px-5 py-4 rounded-2xl text-white placeholder:text-white/50"
                   placeholder="Password" autocomplete="new-password">
          </div>
          <button onclick="login()" 
                  class="btn-neon w-full py-4 rounded-2xl text-lg font-semibold text-white min-h-[44px]">
            Sign In
          </button>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="hidden">
        <div class="space-y-5">
          <div>
            <input type="text" id="regName" 
                   class="input-neon w-full px-5 py-4 rounded-2xl text-white placeholder:text-white/50"
                   placeholder="Full Name">
          </div>
          <div>
            <input type="email" id="regEmail" 
                   class="input-neon w-full px-5 py-4 rounded-2xl text-white placeholder:text-white/50"
                   placeholder="Email address" autocomplete="off">
          </div>
          <div>
            <input type="password" id="regPassword" 
                   class="input-neon w-full px-5 py-4 rounded-2xl text-white placeholder:text-white/50"
                   placeholder="Create Password">
          </div>
          <button onclick="register()" 
                  class="btn-neon w-full py-4 rounded-2xl text-lg font-semibold text-white min-h-[44px]">
            Create Account
          </button>
        </div>
      </div>

      <div class="text-center mt-6 text-sm text-white/60">
        Secure • Private • Real-time
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('loginTab').classList.toggle('active', tab === 0);
      document.getElementById('registerTab').classList.toggle('active', tab === 1);
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 0);
      document.getElementById('registerForm').classList.toggle('hidden', tab !== 1);
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!email || !password) {
        showError('loginEmail');
        showError('loginPassword');
        return alert("Please enter email and password");
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('name', data.name);
          localStorage.setItem('email', data.email);
          localStorage.setItem('isAdmin', data.isAdmin);
          window.location.href = '/dashboard';
        } else {
          alert(data.error || "Invalid email or password");
        }
      } catch (err) {
        alert("Connection error. Please try again.");
      }
    }

    async function register() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();

      if (!name || !email || !password) {
        alert("Please fill all fields");
        return;
      }

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.success) {
          alert("✅ Account created successfully! Please sign in.");
          switchTab(0);
        } else {
          alert(data.error || "Registration failed");
        }
      } catch (err) {
        alert("Server error. Please try again.");
      }
    }

    function showError(id) {
      const el = document.getElementById(id);
      if (el) {
        el.classList.add('input-error');
        setTimeout(() => el.classList.remove('input-error'), 800);
      }
    }

    // Enter key support
    document.getElementById('loginPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
    document.getElementById('regPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
